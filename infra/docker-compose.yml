name: oddzilla

services:
  postgres:
    image: postgres:16-alpine
    container_name: oddzilla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oddzilla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oddzilla}
      POSTGRES_DB: ${POSTGRES_DB:-oddzilla}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oddzilla} -d ${POSTGRES_DB:-oddzilla}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oddzilla

  redis:
    image: redis:7-alpine
    container_name: oddzilla-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oddzilla

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: oddzilla-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-oddzilla}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-oddzilla}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - oddzilla

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  oddzilla:
    driver: bridge
