services:
  pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oddzilla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-oddzilla}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oddzilla} -d ${POSTGRES_DB:-oddzilla}']
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-oddzilla}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10

  apia:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
      cache:
        condition: service_healthy
      mq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-oddzilla}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB:-oddzilla}?schema=public
      REDIS_URL: redis://cache:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-oddzilla}:${RABBITMQ_PASSWORD}@mq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ENABLE_MOCK_FEED: ${ENABLE_MOCK_FEED:-true}
      MOCK_FEED_TICK_MS: ${MOCK_FEED_TICK_MS:-2000}
      MOCK_FEED_SEED: ${MOCK_FEED_SEED:-42}
      ODDIN_NODE_ID: ${ODDIN_NODE_ID:-1}
      ODDIN_EXCHANGE: ${ODDIN_EXCHANGE:-unifiedfeed.integration}
      ODDIN_QUEUE_NAME: ${ODDIN_QUEUE_NAME:-oddzilla.consumer}
      ODDIN_ROUTING_KEY_PATTERN: ${ODDIN_ROUTING_KEY_PATTERN:-#}
    ports:
      - '127.0.0.1:${API_PORT:-3001}:3001'
    networks:
      default: {}
      shared_edge:
        aliases:
          - ${COMPOSE_PROJECT_NAME:-oddzilla}-api

  weba:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - apia
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    networks:
      default: {}
      shared_edge:
        aliases:
          - ${COMPOSE_PROJECT_NAME:-oddzilla}-web

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:

networks:
  default: {}
  shared_edge:
    name: ${SHARED_EDGE_NETWORK:-oddzilla_default}
    external: true
